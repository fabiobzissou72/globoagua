<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Entrar - Globo Agua</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(145deg,#1976D2,#0d47a1); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .box { width: 100%; max-width: 380px; background: #fff; border-radius: 20px; padding: 28px 24px; box-shadow: 0 15px 40px rgba(0,0,0,.25); }
    .logo { text-align: center; margin-bottom: 20px; }
    .logo img { width: 72px; height: 72px; border-radius: 16px; object-fit: cover; }
    .logo h1 { font-size: 20px; margin-top: 8px; color: #1d2430; }
    .logo p { font-size: 13px; color: #667085; margin-top: 2px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    .field input { width: 100%; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 14px; font-size: 15px; outline: none; transition: border-color .15s; }
    .field input:focus { border-color: #1976D2; }
    .btn { width: 100%; border: none; border-radius: 12px; padding: 13px; background: #1976D2; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .msg { font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; color: #ef4444; }
    .hint { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <img src="/images/logo.jpeg" alt="Globo Agua" onerror="this.style.display='none'">
      <h1>Globo Agua</h1>
      <p>Entre com seu acesso</p>
    </div>
    <div class="field">
      <label>E-mail ou celular</label>
      <input id="identifier" type="text" placeholder="email@exemplo.com ou 11999999999" autocomplete="username">
    </div>
    <div class="field">
      <label>Senha</label>
      <input id="password" type="password" placeholder="Sua senha" autocomplete="current-password">
    </div>
    <button id="loginBtn" class="btn" onclick="doLogin()">Entrar</button>
    <div id="msg" class="msg"></div>
    <div class="hint">Você será redirecionado para sua área automaticamente.</div>
  </div>

  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.APP_CONFIG;

    function normalizePhone(v) { return String(v || '').replace(/\D/g, ''); }
    function phoneToEmail(p) { return `entregador_${p}@entrega.globoagua.app`; }
    function mkClient(storageKey) {
      return supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { storageKey, persistSession: true }
      });
    }
    function setMsg(text, color) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.style.color = color || '#ef4444';
    }
    function setLoading(on) {
      const btn = document.getElementById('loginBtn');
      btn.disabled = on;
      btn.textContent = on ? 'Entrando...' : 'Entrar';
    }
    function showErr(msg) {
      setLoading(false);
      setMsg(msg);
    }

    document.getElementById('identifier').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
      const raw = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;
      if (!raw || !password) { setMsg('Preencha os dois campos'); return; }

      setLoading(true);
      setMsg('');

      const phone = normalizePhone(raw);
      const isPhone = /^\d{10,11}$/.test(phone);

      // ENTREGADOR — celular
      if (isPhone) {
        const sb = mkClient('ga-driver-session');
        const { error } = await sb.auth.signInWithPassword({ email: phoneToEmail(phone), password });
        if (error) { showErr('Celular ou senha incorretos.'); return; }
        setMsg('Redirecionando...', '#166534');
        window.location.href = '/entregador';
        return;
      }

      // EMAIL — pode ser admin, operador ou cliente
      // Tenta com a chave do admin primeiro
      const sbAdmin = mkClient('ga-admin-session');
      const { data: aData, error: aErr } = await sbAdmin.auth.signInWithPassword({ email: raw, password });

      if (aErr) {
        // Credenciais erradas — tenta como cliente
        const sbClient = mkClient('ga_auth_session');
        const { error: cErr } = await sbClient.auth.signInWithPassword({ email: raw, password });
        if (cErr) {
          const m = String(aErr.message || '').toLowerCase();
          if (m.includes('email not confirmed')) showErr('Conta não confirmada. Fale com o administrador.');
          else showErr('E-mail ou senha incorretos.');
          return;
        }
        setMsg('Redirecionando...', '#166534');
        window.location.href = '/';
        return;
      }

      // Login ok — verifica o role
      const { data: profile } = await sbAdmin
        .from('profiles')
        .select('role, is_admin')
        .eq('id', aData.user.id)
        .maybeSingle();

      const role = profile?.role || '';
      const isAdm = !!profile?.is_admin;

      if (isAdm || role === 'admin') {
        setMsg('Redirecionando...', '#166534');
        window.location.href = '/admin';
      } else if (role === 'operador') {
        setMsg('Redirecionando...', '#166534');
        window.location.href = '/pedido';
      } else {
        // Não é admin/operador — desloga da chave admin e loga como cliente
        await sbAdmin.auth.signOut();
        const sbClient = mkClient('ga_auth_session');
        await sbClient.auth.signInWithPassword({ email: raw, password });
        setMsg('Redirecionando...', '#166534');
        window.location.href = '/';
      }
    }
  </script>
</body>
</html>
